version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    # Dependency updates are reviewed and applied manually.
    open-pull-requests-limit: 0
    # These manifests are static analyzer inputs and are never installed.
    exclude-paths:
      - test/benchmarks/**

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
